<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Statistical Security Report</title>
    <style>
        body {
            background: #050a10;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: #00d4ff;
            text-transform: uppercase;
            font-size: 22px;
            letter-spacing: 3px;
            margin-top: 20px;
            margin-bottom: 40px;
        }
        .charts-wrapper {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }
        .chart-container {
            background: #000;
            /* هنا سر الحواف المضيئة */
            border: 2px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            transition: 0.3s;
        }
        /* توهج إضافي عند تمرير الماوس */
        .chart-container:hover {
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
            border-color: #00fbff;
        }
        .chart-title {
            font-size: 11px;
            color: #8899a6;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        img {
            width: 100%;
            border-radius: 5px;
            display: block;
        }
        .entropy-text {
            color: #00ffaa;
            font-family: 'Courier New', monospace;
            font-size: 34px;
            font-weight: bold;
            margin: 50px 0;
            text-shadow: 0 0 15px rgba(0, 255, 170, 0.6);
        }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 12px 35px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📊 STATISTICAL SECURITY REPORT</h1>

        <div class="charts-wrapper">
            <div class="chart-container">
                <div class="chart-title">ORIGINAL HISTOGRAM</div>
                <img src="/static/uploads/{{ h_orig }}">
            </div>

            <div class="chart-container">
                <div class="chart-title">ENCRYPTED HISTOGRAM</div>
                <img src="/static/uploads/{{ h_enc }}">
            </div>
        </div>

        <div class="entropy-text">
            Entropy: {{ entropy }} bits/pixel
        </div>

        <div style="margin-top: 20px;">
            <a href="/sender_panel" class="back-btn">← Back to Console</a>
        </div>
    </div>

</body>
</html>
