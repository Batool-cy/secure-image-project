<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receiver Control Unit</title>
    <style>
        body { background: #050a10; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 40px; }
        .container { max-width: 1000px; margin: auto; background: #101820; padding: 30px; border-radius: 20px; border: 1px solid #1a2a3a; }
        .gallery { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { flex: 1; background: #000; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .card p { font-size: 11px; color: #d400ff; text-transform: uppercase; margin-bottom: 15px; }
        img { width: 100%; border-radius: 8px; min-height: 250px; object-fit: contain; background: #0a0a0a; border: 1px solid #222; }
        .btn-group { display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-dec { background: #d400ff; color: white; }
        .btn-dec:hover { background: #a000c8; }
        .btn-brute { background: transparent; border: 1px solid #ff0044; color: #ff0044; }
        .btn-brute:hover { background: #ff0044; color: white; }

        /* Modal for Brute Force Console */
        #bruteModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; }
        .console-box { width: 500px; background: #000; padding: 25px; border: 2px solid #ff0044; border-radius: 10px; }
        #consoleText { height: 300px; overflow-y: auto; text-align: left; font-family: 'Courier New', monospace; color: #0f0; font-size: 13px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #d400ff; letter-spacing: 2px;">🛡 RECEIVER CONTROL TERMINAL</h2>
        <div class="gallery">
            <div class="card">
                <p>[ Ciphertext Input - Noise Preview ]</p>
                <img src="data:image/png;base64,{{ preview }}" id="preview_img">
            </div>
            <div id="dec_card" class="card" style="display:none;">
                <p style="color:#00ffcc;">[ Successfully Decrypted Image ]</p>
                <img id="dec_img">
            </div>
        </div>
        <div class="btn-group">
            <button onclick="executeDecryption()" class="btn btn-dec">Execute Decryption</button>
            <button onclick="showBruteForce()" class="btn btn-brute">Test RSA Vulnerability</button>
        </div>
        <br><a href="/" style="color:#444; text-decoration:none; display:inline-block; margin-top:20px;">← Back to Main Portal</a>
    </div>

    <div id="bruteModal">
        <div class="console-box">
            <h3 style="color:#ff0044; margin-top:0;">BRUTE FORCE ATTACK SIMULATION</h3>
            <div id="consoleText"></div>
            <button onclick="document.getElementById('bruteModal').style.display='none'" style="background:#333; color:white; border:none; padding:10px; width:100%; cursor:pointer;">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        async function executeDecryption() {
            const resp = await fetch('/decrypt_action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ file: "{{ enc_file }}", key: "{{ key }}" })
            });
            const data = await resp.json();
            if (data.dec_file) {
                const decImg = document.getElementById('dec_img');
                const decCard = document.getElementById('dec_card');
                
                decCard.style.display = "block";
                
                // التعديل الجوهري هنا: نضع بيانات Base64 القادمة من JSON داخل الـ src مباشرة
                // هذا يحل مشكلة الـ 401 والـ 404 نهائياً
                decImg.src = "data:image/png;base64," + data.dec_file;
                
            } else { 
                alert("Access Denied: Key mismatch or Unauthorized access."); 
            }
        }

        function showBruteForce() {
            document.getElementById('bruteModal').style.display = 'flex';
            const con = document.getElementById('consoleText');
            con.innerHTML = "Initializing RSA-2048 Key Factorization...<br><br>";
            let i = 0;
            const timer = setInterval(() => {
                const hexKey = Math.random().toString(16).substr(2, 12).toUpperCase();
                con.innerHTML += `Attempting Key Segment: ${hexKey}... <span style="color:red">FAILED</span><br>`;
                con.scrollTop = con.scrollHeight;
                if (++i > 25) {
                    clearInterval(timer);
                    con.innerHTML += "<br><b style='color:red'>[CRITICAL] ATTACK TERMINATED: Encryption too complex for Brute Force.</b>";
                }
            }, 80);
        }
    </script>
</body>
</html>
