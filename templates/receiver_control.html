<div class="gallery">
    <div class="card">
        <p>[ Ciphertext Input - Noise Preview ]</p>
        <img src="data:image/png;base64,{{ preview }}" id="preview_img" onerror="this.src='https://via.placeholder.com/300?text=Encrypted+Data+Stream'">
    </div>
    <div id="dec_card" class="card" style="display:none;">
        <p style="color:#00ffcc;">[ Successfully Decrypted Image ]</p>
        <img id="dec_img">
    </div>
</div>

<div class="btn-group">
    <button onclick="executeDecryption()" class="btn btn-dec">Execute Decryption</button>
    <button onclick="downloadSecurely()" class="btn" style="background:#00ffcc; color:black;">Save Encrypted Image</button>
</div>

<script>
    // دالة التحميل الآمن (تأخذ البيانات من ذاكرة المتصفح)
    function downloadSecurely() {
        const img = document.getElementById('preview_img');
        if (img && img.src.startsWith('data:image')) {
            const link = document.createElement('a');
            link.href = img.src;
            link.download = "Encrypted_Noise_Image.png";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } else {
            alert("⚠️ لا توجد بيانات صورة صالحة للتحميل حالياً.");
        }
    }

    async function executeDecryption() {
        const resp = await fetch('/decrypt_action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ file: "{{ enc_file }}", key: "{{ key }}" })
        });
        const data = await resp.json();
        
        if (data.dec_file) {
            const decImg = document.getElementById('dec_img');
            const decCard = document.getElementById('dec_card');
            decCard.style.display = "block";
            // عرض الصورة المفكوكة فوراً
            decImg.src = "data:image/png;base64," + data.dec_file;
        } else {
            alert("❌ خطأ: مفتاح فك التشفير غير صحيح أو الوصول مرفوض.");
        }
    }
</script>
