<div class="gallery">
    <div class="card">
        <p>[ Ciphertext Input - Noise Preview ]</p>
        <img src="data:image/png;base64,{{ preview }}" id="preview_img" onerror="this.src='https://via.placeholder.com/300?text=Encrypted+Data+Stream'">
    </div>
    <div id="dec_card" class="card" style="display:none;">
        <p style="color:#00ffcc;">[ Successfully Decrypted Image ]</p>
        <img id="dec_img">
    </div>
</div>

<div class="btn-group">
    <button onclick="executeDecryption()" class="btn btn-dec">Execute Decryption</button>
    <button onclick="downloadSecurely()" class="btn" style="background:#00ffcc; color:black;">Save Encrypted Image</button>
</div>

<button onclick="forceDownload()" class="btn" style="background:#00ffcc; color:black;">Download Encrypted Image</button>

<script>
function forceDownload() {
    const img = document.getElementById('preview_img');
    
    // فحص: هل الصورة محملة فعلاً؟
    if (!img || img.src.includes('undefined') || img.src === "") {
        alert("⚠️ خطأ: بيانات الصورة لم تصل من السيرفر بعد.");
        return;
    }

    // فحص: هل البيانات بصيغة Base64؟
    if (img.src.startsWith('data:image')) {
        const link = document.createElement('a');
        link.href = img.src;
        link.download = "Encrypted_Image_Final.png";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert("✅ بدأ التحميل الآن من ذاكرة المتصفح!");
    } else {
        // إذا كان المتصفح يحاول التحميل من رابط قديم
        alert("⚠️ المتصفح يحاول استخدام رابط قديم، سأحاول التحويل اليدوي...");
        window.open(img.src, '_blank');
    }
}
</script>
