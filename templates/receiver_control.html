<div class="card">
    <p>[ Ciphertext Input - Noise Preview ]</p>
    <img src="data:image/png;base64,{{ preview }}" id="preview_img">
</div>

<div class="btn-group">
    <button onclick="executeDecryption()" class="btn btn-dec">Execute Decryption</button>
    <button onclick="saveImage()" class="btn" style="background:#00ffcc; color:black;">Save Encrypted Image</button>
</div>

<script>
    // دالة الحفظ التي تحل مشكلة Not Found
    function saveImage() {
        const img = document.getElementById('preview_img');
        const link = document.createElement('a');
        link.href = img.src;
        link.download = "encrypted_noise.png";
        link.click();
    }

    async function executeDecryption() {
        const resp = await fetch('/decrypt_action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ file: "{{ enc_file }}", key: "{{ key }}" })
        });
        const data = await resp.json();
        if (data.dec_file) {
            document.getElementById('dec_card').style.display = "block";
            // عرض الصورة المفكوكة باستخدام Base64
            document.getElementById('dec_img').src = "data:image/png;base64," + data.dec_file;
        } else { alert("Key mismatch!"); }
    }
</script>
